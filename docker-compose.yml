services:
  mysql:
    image: mysql:8
    container_name: ggumu-mysql
    environment:
      MYSQL_DATABASE: ggumu
      MYSQL_USER: ggumu
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ggumu-mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: ggumu-redis
    ports:
      - "6379:6379"

volumes:
  ggumu-mysql-data:
