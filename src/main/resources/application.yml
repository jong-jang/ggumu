spring:
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/ggumu?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ggumu
    password: ${MYSQL_PASSWORD:ggumu1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:local-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:local-kakao-client-secret}
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - profile_image
              - account_email
              - friends
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-chars}
  access-token-expiration: 1800000       # 30분
  refresh-token-expiration: 1209600000   # 14일

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:local-bucket}
    region: ${AWS_S3_REGION:ap-northeast-2}
    access-key: ${AWS_ACCESS_KEY:local-access-key}
    secret-key: ${AWS_SECRET_KEY:local-secret-key}

oauth2:
  redirect-url: ${OAUTH2_REDIRECT_URL:http://localhost:3000/oauth2/callback}
