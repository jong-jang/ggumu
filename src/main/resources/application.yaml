spring:
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/ggumu?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ggumu
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
